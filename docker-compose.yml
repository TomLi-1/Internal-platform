services:
  photo-postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tomli}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345678}
      POSTGRES_DB: ${POSTGRES_DB:-photo_app}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tomli} -d ${POSTGRES_DB:-photo_app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  flask-web:
    build: .
    environment:
      DB_URL: postgresql://${POSTGRES_USER:-tomli}:${POSTGRES_PASSWORD:-12345678}@photo-postgres:5432/${POSTGRES_DB:-photo_app}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret}
      JWT_EXPIRES_HOURS: ${JWT_EXPIRES_HOURS:-6}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
    ports:
      - "5001:5001"
    depends_on:
      photo-postgres:
        condition: service_healthy
    command: >
      sh -c "python -c \"from app import create_app; from models import db; app=create_app(); app.app_context().push(); db.create_all(); print('tables ready')\" && python -c \"from populate import seed_database; seed_database(reset=False)\" && python app.py"
    restart: unless-stopped

volumes:
  postgres_data:
