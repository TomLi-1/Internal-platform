apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: myapp-rs
spec:
  replicas: 4
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: myapp
        image: tomliii/flask-app:v2
        ports:
        - containerPort: 5000
        env:
          - name: DB_URL
            value: postgresql://tomli:12345678@photo-postgres:5432/photo_app


